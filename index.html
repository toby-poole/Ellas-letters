<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ella</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lora:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Lora', serif;
        }

        body {
            background: #2d4a3e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            overflow: hidden;
        }

        .pw-bg-leaf {
            position: fixed;
            font-size: 60px;
            opacity: 0.04;
            pointer-events: none;
            animation: floatLeaf 14s ease-in-out infinite;
        }
        .pw-bg-leaf:nth-child(1) { top: 10%; left: 8%;  animation-delay: 0s; }
        .pw-bg-leaf:nth-child(2) { top: 70%; left: 80%; animation-delay: 4s; }
        .pw-bg-leaf:nth-child(3) { top: 40%; left: 90%; animation-delay: 8s; }
        .pw-bg-leaf:nth-child(4) { top: 85%; left: 15%; animation-delay: 2s; }

        @keyframes floatLeaf {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%       { transform: translateY(-18px) rotate(6deg); }
        }

        .password-card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 44px 36px 40px;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
            position: relative;
            z-index: 2;
        }

        .password-leaf { font-size: 36px; }

        .password-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: 30px;
            color: #d8eedc;
            text-align: center;
            line-height: 1.2;
        }

        .password-subtitle {
            font-size: 11px;
            color: rgba(216,238,220,0.45);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-align: center;
            margin-top: -8px;
        }

        .password-input-wrap { width: 100%; }

        .password-input-wrap input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            padding: 14px 18px;
            color: #d8eedc;
            font-family: 'Lora', serif;
            font-size: 16px;
            letter-spacing: 0.08em;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            text-align: center;
            -webkit-appearance: none;
        }
        .password-input-wrap input::placeholder { color: rgba(216,238,220,0.28); }
        .password-input-wrap input:focus {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.12);
        }

        .password-btn {
            width: 100%;
            padding: 15px;
            background: #5c8a6a;
            border: none;
            border-radius: 10px;
            color: #f0f7f1;
            font-family: 'Lora', serif;
            font-size: 15px;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            -webkit-appearance: none;
        }
        .password-btn:hover  { background: #6a9e79; }
        .password-btn:active { transform: scale(0.98); }

        .password-error {
            font-size: 13px;
            color: #e8a0a0;
            letter-spacing: 0.05em;
            min-height: 16px;
            text-align: center;
            margin-top: -8px;
        }

        @media (max-width: 400px) {
            .password-card { padding: 36px 24px 32px; }
        }
    </style>
</head>
<body>

    <div class="pw-bg-leaf">🍃</div>
    <div class="pw-bg-leaf">🌿</div>
    <div class="pw-bg-leaf">🍃</div>
    <div class="pw-bg-leaf">🌿</div>

    <div class="password-card">
        <div class="password-leaf">🍵</div>
        <div style="display:flex;flex-direction:column;gap:8px;width:100%;text-align:center;">
            <div class="password-title">for ella</div>
            <div class="password-subtitle">enter to continue</div>
        </div>
        <div class="password-input-wrap">
            <input type="password" id="pw-input" placeholder="password" autocomplete="off" />
        </div>
        <div class="password-error" id="pw-error">&nbsp;</div>
        <button class="password-btn" id="pw-btn">Enter ↗</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        emailjs.init("XT9NrnS38p-fZJkDb");

        function sendVisitEmail() {
            const now = new Date();
            emailjs.send("service_nc91o5s", "template_d1ew17p", {
                date: now.toLocaleDateString("en-AU", { timeZone: "Australia/Brisbane" }),
                time: now.toLocaleTimeString("en-AU", { timeZone: "Australia/Brisbane" }),
            }).then(() => console.log("✅ Email sent!"))
              .catch(err => console.error("❌ Email failed:", err));
        }

        const PASSWORD = "smelly";

        function tryPassword() {
            const val = document.getElementById('pw-input').value;
            const err = document.getElementById('pw-error');
            if (val.toLowerCase() === PASSWORD) {
                err.innerHTML = '&nbsp;';
                sessionStorage.setItem('verified', 'true');
                sendVisitEmail();
                window.location.href = 'hub.html';
            } else {
                err.textContent = 'try again 🍵';
                document.getElementById('pw-input').value = '';
                document.getElementById('pw-input').focus();
            }
        }

        document.getElementById('pw-btn').addEventListener('click', tryPassword);
        document.getElementById('pw-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') tryPassword();
        });
    </script>
</body>
</html>
