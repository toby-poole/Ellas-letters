<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ella — Letters</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lora:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            font-family: 'Lora', serif;
            background: #e8f0e9;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(122,170,132,0.14) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(122,170,132,0.10) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .hub-inner {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 56px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hub-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .hub-eyebrow {
            font-size: 11px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #7aaa84;
            margin-bottom: 12px;
        }

        .hub-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(36px, 8vw, 54px);
            color: #2d4a3e;
            line-height: 1.1;
        }

        .hub-title span {
            display: block;
            font-style: normal;
            font-weight: 400;
            font-size: clamp(14px, 3.5vw, 18px);
            color: #7aaa84;
            letter-spacing: 0.04em;
            margin-top: 10px;
        }

        .hub-divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(to right, #7aaa84, #a8c9ae);
            margin: 24px auto 0;
            border-radius: 2px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .letter-card {
            background: #fff;
            border: 1px solid #d0e4d3;
            border-radius: 16px;
            padding: 32px 24px 28px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .letter-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(122,170,132,0.07) 0%, rgba(255,255,255,0) 60%);
            pointer-events: none;
        }

        .letter-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(45,74,62,0.12);
            border-color: #7aaa84;
        }
        .letter-card:active { transform: translateY(-1px); }

        .card-icon  { font-size: 32px; line-height: 1; }

        .card-label {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #7aaa84;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 21px;
            font-weight: 400;
            color: #2d4a3e;
            line-height: 1.2;
        }

        .card-desc {
            font-size: 13px;
            color: #7a9a80;
            line-height: 1.6;
            font-style: italic;
        }

        .card-arrow {
            margin-top: 4px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #eaf3ec;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5c8a6a;
            font-size: 15px;
            transition: background 0.2s, color 0.2s;
        }

        .letter-card:hover .card-arrow {
            background: #7aaa84;
            color: #fff;
        }

        .hub-footer {
            margin-top: 48px;
            font-size: 12px;
            color: #a8bfaa;
            letter-spacing: 0.08em;
            font-style: italic;
            text-align: center;
        }

        @media (max-width: 400px) {
            .hub-inner { padding: 44px 16px 48px; }
        }
    </style>
</head>
<body>
    <script>
        if (sessionStorage.getItem('verified') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>

    <div class="hub-inner">
        <div class="hub-header">
            <div class="hub-eyebrow">a little collection</div>
            <div class="hub-title">
                for ella
                <span>with love, Toby</span>
            </div>
            <div class="hub-divider"></div>
        </div>

        <div class="hub-grid">

            <a class="letter-card" href="letter1.html">
                <div class="card-icon">💌</div>
                <div class="card-label">Letter No. 1</div>
                <div class="card-title">A Christmas Letter</div>
                <div class="card-desc">Written with love from far away, for the girl who makes every distance feel smaller.</div>
                <div class="card-arrow">→</div>
            </a>

            <a class="letter-card" href="letter2.html">
                <div class="card-icon">🌿</div>
                <div class="card-label">Letter No. 2</div>
                <div class="card-title">Home for a while</div>
                <div class="card-desc">For the girl who's gone green — enjoy every bit of it.</div>
                <div class="card-arrow">→</div>
            </a>

        </div>

        <div class="hub-footer">made just for you 🍵</div>
    </div>
</body>
</html>
